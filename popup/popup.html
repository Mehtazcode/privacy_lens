<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PrivacyLens</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Header — always visible -->
  <header>
    <div class="logo-group">
      <span class="logo-icon">🔍</span>
      <span class="logo">PrivacyLens</span>
    </div>
    <div class="daily-usage" id="usage-counter">0/10 today</div>
  </header>

  <!-- Status message (shown while loading, on error, or on non-T&C pages) -->
  <div id="status-section" class="status-loading">
    <p id="status-message">Analyzing...</p>
  </div>

  <!-- Main results (hidden until analysis is ready) -->
  <main id="main-content" style="display: none;">

    <!-- Risk Score — full-bleed verdict card -->
    <div id="risk-score-section">
      <p class="risk-label">Risk Level</p>
      <div id="risk-score-badge" class="badge">Unknown</div>
    </div>

    <!-- Summary -->
    <section class="card">
      <h2>Summary</h2>
      <p id="data-summary">No summary available.</p>
    </section>

    <!-- Red Flags -->
    <section class="card">
      <h2>Red Flags</h2>
      <ul id="red-flags-list"></ul>
    </section>

    <!-- Third Parties -->
    <section class="card">
      <h2>Third Parties</h2>
      <ul id="third-parties-list"></ul>
    </section>

  </main>

  <script src="popup.js"></script>
</body>
</html>
